name: 云瞰 VMS (OpenVINO)
version: "0.9.31"
slug: yunkan-openvino
description: 自托管摄像头云录制 + AI 分析。OpenVINO 变体，支持 Intel iGPU (UHD 6xx+ / Iris Xe / Arc) 硬件加速，J4125 / N100 / N305 等机型推理吞吐 3-5x。
url: https://yun-kan.com
arch:
  - amd64
startup: services
boot: auto
init: false
host_network: true
hassio_api: false
homeassistant_api: false
host_dbus: false
host_pid: false
privileged: []
full_access: false
devices:
  - /dev/dri:/dev/dri:rwm
udev: true
map:
  - share:rw
  - backup:rw
ports:
  23406/tcp: 23406
  23880/tcp: 23880
  24214/tcp: 24214
  24215/tcp: 24215
  23515/udp: 23515
ports_description:
  23406/tcp: HTTP Dashboard / API（nginx 总入口）
  23880/tcp: RTSP（摄像头 / 外部播放器直连 mediamtx）
  24214/tcp: HLS 拉流
  24215/tcp: WebRTC WHEP signaling
  23515/udp: WebRTC ICE (UDP)
webui: "http://[HOST]:[PORT:23406]/"
panel_icon: mdi:cctv
panel_title: 云瞰 (OpenVINO)
panel_admin: true
options:
  timezone: Asia/Shanghai
schema:
  timezone: str
environment:
  TZ: "{{ options.timezone }}"
  SKYVIEW_SELF_CONTAINER_NAME: addon_local_yunkan-openvino
