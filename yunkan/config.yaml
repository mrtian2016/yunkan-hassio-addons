name: 云瞰 SkyView
version: "0.7.3"
slug: yunkan
description: 自托管摄像头云录制 + AI 分析（人/车/人脸/车牌/姿态/跌倒）。本地优先，隐私不出局域网。
url: https://yun-kan.com
arch:
  - amd64
startup: services
boot: auto
init: false
host_network: true
hassio_api: false
homeassistant_api: false
host_dbus: false
host_pid: false
privileged: []
full_access: false
map:
  - share:rw
  - backup:rw
ports:
  18080/tcp: 18080
  18554/tcp: 18554
  18888/tcp: 18888
  18889/tcp: 18889
  18189/udp: 18189
ports_description:
  18080/tcp: HTTP Dashboard / API（nginx 总入口）
  18554/tcp: RTSP（摄像头 / 外部播放器直连 mediamtx）
  18888/tcp: HLS 拉流
  18889/tcp: WebRTC WHEP signaling
  18189/udp: WebRTC ICE (UDP)
webui: "http://[HOST]:[PORT:18080]/"
panel_icon: mdi:cctv
panel_title: 云瞰
panel_admin: true
options:
  timezone: Asia/Shanghai
  log_level: info
  public_host: ""
  public_scheme: http
  public_port: 18080
schema:
  timezone: str
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  public_host: str?
  public_scheme: list(http|https)?
  public_port: int(1,65535)?
environment:
  TZ: "{{ options.timezone }}"
  SKYVIEW_PUBLIC_HOST: "{{ options.public_host }}"
  SKYVIEW_PUBLIC_SCHEME: "{{ options.public_scheme }}"
  SKYVIEW_PUBLIC_PORT: "{{ options.public_port }}"
  SKYVIEW_SELF_CONTAINER_NAME: addon_local_yunkan
